# ─── AI Runner — CI pipeline ─────────────────────────
# Pipeline d'intégration continue : lint → tests → build Docker.
# Se déclenche à chaque push et à chaque PR sur main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ────────────────────────────────────────────────────────
  # Job 1 — Lint (ruff)
  # Warnings non bloquants pour l'instant (continue-on-error)
  # ────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Run ruff
        run: ruff check app/ tests/ main.py

  # ────────────────────────────────────────────────────────
  # Job 2 — Tests (pytest + coverage)
  # Ce job BLOQUE les PR si les tests échouent.
  # ────────────────────────────────────────────────────────
  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project (with dev deps)
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

  # ────────────────────────────────────────────────────────
  # Job 3 — Docker build (vérification que le build passe)
  # Dépend de lint + tests. Ne push PAS l'image.
  # ────────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t ai-runner:ci .